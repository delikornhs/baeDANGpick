<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 비교 - 배당픽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="/data/output/etf_data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f7f4;--white:#fff;--ink:#1a1a18;--ink2:#4a4a45;--ink3:#9a9a93;--ink4:#d4d4cc;
  --accent:#1d6b38;--accent-bg:#edf7f1;--accent-mid:#6cba8b;
  --blue:#1a56db;--blue-bg:#eff6ff;
  --red:#c0392b;--red-bg:#fef2f2;
  --border:#e8e8e2;--radius:10px;
}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans KR",sans-serif;min-height:100vh;line-height:1.6}
nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:200}
.nav-inner{max-width:1100px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:15px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:7px;text-decoration:none;color:var(--ink)}
.logo-mark{width:22px;height:22px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.nav-tag{font-size:11px;color:var(--ink3);background:var(--bg);padding:3px 8px;border-radius:4px;border:1px solid var(--border)}
.wrap{max-width:1100px;margin:0 auto;padding:28px 20px 80px}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--ink3);text-decoration:none;margin-bottom:16px;transition:color .15s}
.back-btn:hover{color:var(--ink)}
/* page header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.4px}
/* etf selector chips */
.etf-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.etf-chip{display:inline-flex;align-items:center;gap:8px;border-radius:20px;font-size:12px;font-weight:600;padding:6px 14px;border:1.5px solid}
.etf-chip button{background:none;border:none;cursor:pointer;font-size:15px;line-height:1;padding:0;color:inherit;opacity:.7}
.etf-chip button:hover{opacity:1}
/* colors for up to 3 ETFs */
.chip-0{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.chip-1{background:#fef9c3;color:#854d0e;border-color:#fde68a}
.chip-2{background:#fce7f3;color:#9d174d;border-color:#fbcfe8}
/* card */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
/* summary boxes */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:600px){.summary-grid{grid-template-columns:1fr}}
.sum-box{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.sum-label{font-size:11px;color:var(--ink3);margin-bottom:4px}
.sum-val{font-size:14px;font-weight:700;color:var(--ink)}
.sum-sub{font-size:11px;color:var(--accent);margin-top:3px}
/* chart */
.chart-wrap{position:relative;height:220px}
/* comparison table */
.cmp-table{width:100%;border-collapse:collapse;font-size:12px}
.cmp-table th{background:var(--bg);color:var(--ink3);font-weight:600;padding:9px 12px;text-align:center;border-bottom:2px solid var(--border)}
.cmp-table th:first-child{text-align:left;width:130px}
.cmp-table td{padding:10px 12px;text-align:center;border-bottom:1px solid var(--border);vertical-align:middle}
.cmp-table td:first-child{text-align:left;color:var(--ink3);font-size:11px;font-weight:600;background:var(--bg)}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-table .section-head td{background:var(--accent-bg);color:var(--accent);font-size:11px;font-weight:700;padding:7px 12px}
.best{background:#dcfce7!important;color:#166534!important;font-weight:700}
.pos{color:var(--accent);font-weight:700}
.neg{color:var(--red);font-weight:700}
.na{color:var(--ink4)}
/* badge */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.sb-great{background:#dcfce7;color:#166534}
.sb-good {background:var(--accent-bg);color:var(--accent)}
.sb-mid  {background:#fff8e1;color:#92400e}
.sb-warn {background:var(--red-bg);color:var(--red)}
.sb-up   {background:#eff6ff;color:#1d4ed8}
.sb-keep {background:var(--bg);color:var(--ink3);border:1px solid var(--border)}
.sb-down {background:var(--red-bg);color:var(--red)}
/* footer */
footer{text-align:center;padding:24px 20px;font-size:12px;color:var(--ink3);border-top:1px solid var(--border);background:var(--white);line-height:1.8}
footer a{color:var(--ink3);text-underline-offset:2px}
.error-wrap{text-align:center;padding:80px 20px}
.error-wrap h2{font-size:20px;color:var(--ink3);margin-bottom:8px}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;text-decoration:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><div class="logo-mark">₩</div>배당픽</a>
    <span class="nav-tag">ETF 비교</span>
  </div>
</nav>

<div class="wrap" id="main" style="display:none">
  <a href="/" class="back-btn">← 목록으로</a>
  <div class="page-header">
    <div class="page-title">ETF 비교</div>
  </div>

  <!-- 선택된 ETF 칩 -->
  <div class="etf-chips" id="chips"></div>

  <!-- 요약 -->
  <div class="summary-grid" id="summaryGrid"></div>

  <!-- 분배금 추이 차트 -->
  <div class="card">
    <div class="card-title">분배금 추이 비교</div>
    <div class="chart-wrap"><canvas id="cmpChart"></canvas></div>
  </div>

  <!-- 비교 테이블 -->
  <div class="card" style="overflow-x:auto">
    <div class="card-title">상세 비교</div>
    <table class="cmp-table" id="cmpTable"></table>
  </div>
</div>

<div class="error-wrap" id="errWrap" style="display:none">
  <h2>비교할 ETF가 없습니다</h2>
  <p style="color:var(--ink3);font-size:13px;margin-bottom:20px">ETF 상세 페이지에서 비교 목록에 추가해 주세요.</p>
  <a href="/" class="btn btn-primary">목록으로 돌아가기</a>
</div>

<footer>
  <a href="/">배당픽 홈으로</a> &nbsp;·&nbsp; <a href="/privacy.html">개인정보처리방침</a><br>
  본 사이트의 정보는 참고 목적으로만 제공되며, 투자의 최종 판단은 본인에게 있습니다.
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
const comma  = n => n == null ? '-' : Number(n).toLocaleString('ko-KR');
const retStr = v => {
  if(v == null || v === 0) return '<span class="na">-</span>';
  const cls = v > 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${v > 0 ? '+' : ''}${v.toFixed(2)}%</span>`;
};

const PALETTE = [
  { line: '#1d4ed8', fill: 'rgba(29,78,216,0.12)' },
  { line: '#b45309', fill: 'rgba(180,83,9,0.12)' },
  { line: '#be185d', fill: 'rgba(190,24,93,0.12)' },
];
const CHIP_CLS  = ['chip-0','chip-1','chip-2'];

function computeStab(e) {
  const trend = (e.trend || []).slice().sort((a,b) => a.ex_date < b.ex_date ? -1 : 1);
  const now   = new Date();
  const msBefore = days => new Date(now - days * 86400000).toISOString().slice(0,10);
  const d6 = msBefore(182), d3 = msBefore(91);
  const six   = trend.filter(t => t.ex_date >= d6).map(t => t.dist);
  const rec3  = trend.filter(t => t.ex_date >= d3).map(t => t.dist);
  const prev3 = trend.filter(t => t.ex_date >= d6 && t.ex_date < d3).map(t => t.dist);
  const year  = trend.map(t => t.dist);
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  let score = '', variation = 0;
  if(six.length >= 2) {
    const a = avg(six);
    if(a > 0) {
      variation = parseFloat(((Math.max(...six)-Math.min(...six))/a*100).toFixed(1));
      score = variation<=15?'변동 적음':variation<=30?'변동 보통':variation<=50?'변동 큼':'변동 매우 큼';
    }
  } else if(six.length===1) score='데이터 부족';
  let trendLabel='', trendPct=0;
  if(rec3.length && prev3.length) {
    const pa=avg(prev3);
    if(pa>0){ trendPct=parseFloat(((avg(rec3)-pa)/pa*100).toFixed(1));
      trendLabel=trendPct>10?'증가':trendPct<-10?'감소':'유지'; }
  } else if(rec3.length) trendLabel='데이터 부족';
  const jan1=new Date().getFullYear()+'-01-01';
  const yearDists=trend.filter(t=>t.ex_date>=jan1).map(t=>t.dist);
  const annualDist=yearDists.reduce((a,b)=>a+b,0);
  let level='';
  const noticePrevPrice=e.dist>0&&e.rate>0?(e.dist/e.rate*100):e.price;
  if(noticePrevPrice>0&&annualDist>0){const r=annualDist/noticePrevPrice*100;
    level=r<4?'저분배율':r<10?'중분배율':r<15?'고분배율':'초고분배율';}
  return {score,variation,trend:trendLabel,trendPct,level,annualDist};
}

function stabBadge(score) {
  if(!score) return '<span class="badge sb-keep">-</span>';
  const cls = {'변동 적음':'sb-great','변동 보통':'sb-good','변동 큼':'sb-mid','변동 매우 큼':'sb-warn','데이터 부족':'sb-keep'}[score]||'sb-keep';
  return `<span class="badge ${cls}">${score}</span>`;
}
function trendBadge(trend) {
  if(!trend) return '<span class="badge sb-keep">-</span>';
  const cls = {'증가':'sb-up','유지':'sb-keep','감소':'sb-down','데이터 부족':'sb-keep'}[trend]||'sb-keep';
  const icon = {'증가':'↑','유지':'→','감소':'↓'}[trend]||'';
  return `<span class="badge ${cls}">${icon} ${trend}</span>`;
}
function levelBadge(level) {
  if(!level) return '<span class="badge sb-keep">-</span>';
  const cls = {'저분배율':'sb-keep','중분배율':'sb-good','고분배율':'sb-mid','초고분배율':'sb-warn'}[level]||'sb-keep';
  return `<span class="badge ${cls}">${level}</span>`;
}

function removeEtf(code) {
  let list = JSON.parse(localStorage.getItem('compareList') || '[]');
  list = list.filter(c => c !== code);
  localStorage.setItem('compareList', JSON.stringify(list));
  location.href = list.length >= 2
    ? '/compare?etf=' + list.join(',')
    : '/';
}

function renderAll(etfs) {
  const n = etfs.length;

  // ── 칩 ──
  document.getElementById('chips').innerHTML = etfs.map((e, i) =>
    `<div class="etf-chip ${CHIP_CLS[i]}">
      <a href="/etf/${e.code}" style="color:inherit;text-decoration:none">[${e.brand}] ${e.name}</a>
      <button onclick="removeEtf('${e.code}')" title="제거">×</button>
    </div>`
  ).join('');

  // ── 요약 박스 ──
  const byDist  = [...etfs].sort((a,b) => b.dist - a.dist)[0];
  // stab 필드 없으면 클라이언트 계산으로 보완
  etfs.forEach(e => { if(!e.stab||!e.stab.score) e.stab = computeStab(e); });

  const byStab  = etfs.filter(e=>e.stab&&e.stab.score).sort((a,b) => {
    const order = {'매우 안정':0,'안정':1,'보통':2,'주의':3};
    return (order[a.stab.score]||9) - (order[b.stab.score]||9);
  })[0];
  const byRate  = [...etfs].sort((a,b) => b.rate - a.rate)[0];

  document.getElementById('summaryGrid').innerHTML = `
    <div class="sum-box">
      <div class="sum-label">💰 분배금 가장 높은 ETF</div>
      <div class="sum-val">${byDist ? byDist.name : '-'}</div>
      <div class="sum-sub">${byDist ? `${comma(byDist.dist)}원` : ''}</div>
    </div>
    <div class="sum-box">
      <div class="sum-label">🛡 가장 안정적인 ETF</div>
      <div class="sum-val">${byStab ? byStab.name : '-'}</div>
      <div class="sum-sub">${byStab && byStab.stab ? byStab.stab.score : ''}</div>
    </div>
    <div class="sum-box">
      <div class="sum-label">📈 분배율 가장 높은 ETF</div>
      <div class="sum-val">${byRate ? byRate.name : '-'}</div>
      <div class="sum-sub">${byRate ? `${byRate.rate}%` : ''}</div>
    </div>
  `;

  // ── 분배금 추이 차트 ──
  // 모든 ETF의 배당락일 합집합 (최근 12개)
  const allDates = [...new Set(
    etfs.flatMap(e => (e.trend||[]).map(t=>t.ex_date))
  )].sort().slice(-12);

  const datasets = etfs.map((e, i) => ({
    label: e.name,
    data: allDates.map(d => {
      const rec = (e.trend||[]).find(t => t.ex_date === d);
      return rec ? rec.dist : null;
    }),
    borderColor: PALETTE[i].line,
    backgroundColor: PALETTE[i].fill,
    fill: true,
    tension: 0.3,
    pointRadius: 4,
    spanGaps: true,
  }));

  new Chart(document.getElementById('cmpChart').getContext('2d'), {
    type: 'line',
    data: {
      labels: allDates.map(d => {
        const m = parseInt(d.slice(5,7));
        return `${d.slice(2,4)}'${m}월`;
      }),
      datasets,
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + comma(ctx.raw) + '원' } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#9a9a93' } },
        y: { grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 }, color: '#9a9a93',
          callback: v => comma(v) + '원' } }
      }
    }
  });

  // ── 비교 테이블 ──
  const hdrCols = etfs.map((e,i) =>
    `<th style="color:${PALETTE[i].line}">[${e.brand}]<br>${e.name}</th>`).join('');

  // 최고값 하이라이트 헬퍼
  const bestIdx = (arr, higher=true) => {
    const valid = arr.map((v,i)=>({v,i})).filter(x=>x.v!=null&&x.v!==0);
    if(!valid.length) return -1;
    return higher
      ? valid.reduce((a,b)=>a.v>b.v?a:b).i
      : valid.reduce((a,b)=>a.v<b.v?a:b).i;
  };
  const row = (label, vals, fmt, higherBetter=true) => {
    const bi = bestIdx(vals.map(v=>parseFloat(v)||0), higherBetter);
    const cells = vals.map((v,i) => {
      const cls = i===bi&&vals.filter(x=>x!=null&&x!=='').length>1 ? ' class="best"' : '';
      return `<td${cls}>${v==null||v===''?'<span class="na">-</span>':fmt(v)}</td>`;
    });
    return `<tr><td>${label}</td>${cells.join('')}</tr>`;
  };
  const retRow = (label, getter, higher=true) => {
    const vals = etfs.map(e=>e[getter]);
    const bi   = bestIdx(vals.map(v=>parseFloat(v)||0), higher);
    const cells = vals.map((v,i) => {
      const cls = i===bi&&vals.filter(x=>x!=null&&x!==0).length>1 ? ' class="best"' : '';
      return `<td${cls}>${retStr(v)}</td>`;
    });
    return `<tr><td>${label}</td>${cells.join('')}</tr>`;
  };

  const avgDist = e => {
    const t = (e.trend||[]).slice(-12);
    return t.length ? Math.round(t.reduce((s,x)=>s+x.dist,0)/t.length) : 0;
  };
  const varDist = e => {
    const t = (e.trend||[]).slice(-6).map(x=>x.dist);
    if(t.length<2) return null;
    const avg = t.reduce((a,b)=>a+b,0)/t.length;
    return avg>0 ? parseFloat(((Math.max(...t)-Math.min(...t))/avg*100).toFixed(1)) : null;
  };

  const stabRow = (label, getter) => {
    const cells = etfs.map(e => {
      const v = (e.stab||{})[getter];
      if(label==='안정성') return `<td>${stabBadge(v)}</td>`;
      if(label==='추세')   return `<td>${trendBadge(v)}</td>`;
      if(label==='분배율 수준') return `<td>${levelBadge(v)}</td>`;
      return `<td>${v||'-'}</td>`;
    }).join('');
    return `<tr><td>${label}</td>${cells}</tr>`;
  };

  const sectionHead = (title) =>
    `<tr class="section-head"><td colspan="${n+1}">${title}</td></tr>`;

  document.getElementById('cmpTable').innerHTML = `
    <thead><tr><th></th>${hdrCols}</tr></thead>
    <tbody>
      ${sectionHead('기본 정보')}
      ${row('기초지수',  etfs.map(e=>e.indexName||'-'),   v=>`<span style="font-size:11px">${v}</span>`, false)}
      ${row('분배 주기', etfs.map(e=>e.freq),              v=>v, false)}
      ${row('전날 종가', etfs.map(e=>e.price),             v=>`${comma(v)}원`, false)}

      ${sectionHead('이번달 분배')}
      ${row('주당 분배금', etfs.map(e=>e.dist),            v=>`${comma(v)}원`)}
      ${row('이번달 분배율', etfs.map(e=>e.rate),          v=>`${v}%`)}

      ${sectionHead('분배금 통계 (12개월 기준)')}
      ${row('평균 분배금',  etfs.map(avgDist),              v=>`${comma(v)}원`)}
      ${row('변동폭',       etfs.map(varDist),              v=>v!=null?`${v}%`:'-', false)}

      ${sectionHead('분배금 안정성')}
      ${stabRow('안정성',    'score')}
      ${stabRow('추세',      'trend')}
      ${stabRow('분배율 수준','level')}

      ${sectionHead('수익률 — 주가')}
      ${retRow('1개월',   'ret1m')}
      ${retRow('3개월',   'ret3m')}
      ${retRow('6개월',   'ret6m')}
      ${retRow('1년',     'ret1y')}
      ${retRow('상장이후','retListed')}

      ${sectionHead('수익률 — 분배금 포함 총수익률')}
      ${retRow('1개월',   'tret1m')}
      ${retRow('3개월',   'tret3m')}
      ${retRow('6개월',   'tret6m')}
      ${retRow('1년',     'tret1y')}
      ${retRow('상장이후','tretListed')}
    </tbody>
  `;

  document.getElementById('main').style.display = '';
}

// ── 초기화 ──
(function() {
  const params = new URLSearchParams(location.search);
  const raw    = params.get('etf') || '';
  const codes  = raw.split(',').map(s=>s.trim()).filter(Boolean);

  // URL에 없으면 localStorage에서 읽기
  const stored = JSON.parse(localStorage.getItem('compareList') || '[]');
  const useCodes = codes.length >= 2 ? codes : stored;

  if(useCodes.length < 2) { document.getElementById('errWrap').style.display=''; return; }

  const all  = typeof ETF_ALL !== 'undefined' ? ETF_ALL : [];
  const etfs = useCodes.slice(0,3).map(c => all.find(e=>e.code===c)).filter(Boolean);

  if(etfs.length < 2) { document.getElementById('errWrap').style.display=''; return; }

  // localStorage 동기화
  localStorage.setItem('compareList', JSON.stringify(etfs.map(e=>e.code)));

  renderAll(etfs);
})();
</script>
</body>
</html>
