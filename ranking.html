<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이번달 월배당 분배율 랭킹 - 배당픽</title>
<meta name="description" content="이번달 월배당 ETF 분배율 랭킹. 월중·월말 분배금 공시를 통합해 분배율 높은 순으로 확인하세요.">
<meta name="robots" content="index, follow">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="/data/output/etf_data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f7f4;--white:#fff;--ink:#1a1a18;--ink2:#4a4a45;--ink3:#9a9a93;--ink4:#d4d4cc;
  --accent:#1d6b38;--accent-bg:#edf7f1;--accent-mid:#6cba8b;
  --warn:#b45309;--warn-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--border:#e8e8e2;--radius:10px;
}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans KR",sans-serif;min-height:100vh}

/* NAV */
nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:200}
.nav-inner{max-width:1100px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:15px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:7px;flex-shrink:0;text-decoration:none;color:var(--ink)}
.logo-mark{width:22px;height:22px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-link{font-size:12px;color:var(--ink2);text-decoration:none;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);transition:all .15s;white-space:nowrap}
.nav-link:hover{color:var(--accent);border-color:var(--accent-mid);background:var(--accent-bg)}
.nav-link.on{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}

/* PAGE HEADER */
.page-header{background:var(--white);border-bottom:1px solid var(--border);padding:24px 20px 20px}
.page-header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.page-header-sub{font-size:12px;color:var(--ink3)}
.update-badge{font-size:11px;color:var(--ink3);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;white-space:nowrap;font-family:"DM Mono",monospace}

/* STATS */
.stats-row{max-width:1100px;margin:0 auto;padding:16px 20px 0;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 18px}
.stat-label{font-size:11px;color:var(--ink3);margin-bottom:4px}
.stat-val{font-size:20px;font-weight:700;color:var(--ink);font-family:"DM Mono",monospace;letter-spacing:-.5px}
.stat-val.accent{color:var(--accent)}
.stat-sub{font-size:11px;color:var(--ink3);margin-top:2px}

/* FILTER */
.filter-wrap{max-width:1100px;margin:0 auto;padding:16px 20px 0}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.filter-row-label{font-size:11px;font-weight:700;color:var(--ink3);width:52px;flex-shrink:0}
.ftog{font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--ink3);cursor:pointer;transition:all .15s;font-family:inherit}
.ftog.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.ftog:hover:not(.on){border-color:var(--ink4);color:var(--ink2)}
.result-meta{font-size:12px;color:var(--ink3);padding:10px 0 4px}

/* RANKING LIST */
.ranking-wrap{max-width:1100px;margin:0 auto;padding:0 20px 48px}
.rank-item{display:flex;align-items:center;gap:14px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:8px;text-decoration:none;color:inherit;transition:all .15s}
.rank-item:hover{border-color:var(--accent-mid);box-shadow:0 2px 10px rgba(29,107,56,.07);transform:translateY(-1px)}
.rank-num{font-size:16px;font-weight:700;color:var(--ink4);font-family:"DM Mono",monospace;width:28px;text-align:center;flex-shrink:0}
.rank-num.top{color:var(--accent)}
.rank-body{flex:1;min-width:0}
.rank-name{font-size:14px;font-weight:700;letter-spacing:-.3px;margin-bottom:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rank-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rank-meta-item{font-size:11px;color:var(--ink3)}
.rank-right{text-align:right;flex-shrink:0}
.rank-rate{font-size:20px;font-weight:700;color:var(--accent);font-family:"DM Mono",monospace;letter-spacing:-.5px}
.rank-dist{font-size:11px;color:var(--ink3);margin-top:3px}

/* BADGES */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid;white-space:nowrap}
.badge-mid{background:#fffbeb;color:#b45309;border-color:#fde68a}
.badge-end{background:var(--blue-bg);color:var(--blue);border-color:#bfdbfe}
.badge-type{background:#f0f4ff;color:#4361ee;border-color:#c7d5ff}
.badge-freq{background:var(--bg);color:var(--ink3);border-color:var(--border)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--ink3)}
.empty p{font-size:14px;margin-bottom:6px}

footer{padding:18px;text-align:center;font-size:11px;color:var(--ink3);border-top:1px solid var(--border);background:var(--white);line-height:1.8;margin-top:8px}

@media(max-width:560px){
  .nav-inner{height:auto;padding:8px 0;flex-direction:column;align-items:flex-start;gap:6px}
  .nav-links{gap:6px}
  .stats-row{grid-template-columns:1fr 1fr}
  .stats-row .stat-card:last-child{grid-column:span 2}
  .rank-rate{font-size:17px}
  .page-header-inner{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><div class="logo-mark">&#8361;</div>배당픽</a>
    <div class="nav-links">
      <a href="/guide.html" class="nav-link">가이드</a>
      <a href="/ranking.html" class="nav-link on">랭킹</a>
      <a href="/calc.html" class="nav-link">계산기</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <div>
      <h1 id="pageTitle">이번달 월배당 분배율 랭킹</h1>
      <p class="page-header-sub" id="pageSubTitle">월중·월말 분배금 공시를 통합한 월배당 ETF 랭킹입니다.</p>
    </div>
    <div class="update-badge" id="updateBadge">업데이트 중...</div>
  </div>
</div>

<div class="stats-row" id="statsRow">
  <div class="stat-card">
    <div class="stat-label">집계 ETF 수</div>
    <div class="stat-val accent" id="statCount">-</div>
    <div class="stat-sub" id="statSub">월중 + 월말</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">최고 분배율</div>
    <div class="stat-val accent" id="statMax">-</div>
    <div class="stat-sub" id="statMaxName">-</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">평균 분배율</div>
    <div class="stat-val" id="statAvg">-</div>
    <div class="stat-sub">월배당 ETF 기준</div>
  </div>
</div>

<div class="filter-wrap">
  <div class="filter-row">
    <span class="filter-row-label">유형</span>
    <button class="ftog on" data-group="type" data-v="all" onclick="setFilter('type','all')">전체</button>
    <button class="ftog" data-group="type" data-v="커버드콜" onclick="setFilter('type','커버드콜')">커버드콜</button>
    <button class="ftog" data-group="type" data-v="리츠" onclick="setFilter('type','리츠')">리츠</button>
    <button class="ftog" data-group="type" data-v="일반배당" onclick="setFilter('type','일반배당')">일반배당</button>
    <button class="ftog" data-group="type" data-v="기타" onclick="setFilter('type','기타')">기타</button>
  </div>
  <div class="result-meta" id="resultMeta"></div>
</div>

<div class="ranking-wrap" id="rankingList"></div>

<footer>
  본 사이트의 정보는 참고 목적으로만 제공되며, 투자의 최종 판단은 본인에게 있습니다.
  <br><a href="https://docs.google.com/forms/d/e/1FAIpQLSflCQap_v_YXjEwRVnjiaQhh9Nkppmw0HWK8YQ1HzR7lAKf9g/viewform?usp=publish-editor" target="_blank" rel="noopener" style="color:var(--ink3);text-decoration:underline;text-underline-offset:2px">오류 및 개선 의견 보내기</a>
  &nbsp;·&nbsp;
  <a href="/privacy.html" style="color:var(--ink3);text-decoration:underline;text-underline-offset:2px">개인정보처리방침</a>
</footer>

<script>
// ── 유틸 ──
function getCategory(e) {
  const t = (e.type || '');
  if (t.includes('커버드콜')) return '커버드콜';
  if (t.includes('리츠'))    return '리츠';
  if (t.includes('배당'))    return '일반배당';
  return '기타';
}
function isMonthly(e) {
  return e.freq === '월배당' || e.freq === '월배당추정';
}
function fmtDate(s) {
  if (!s) return '-';
  const [,m,d] = s.split('-');
  return `${parseInt(m)}.${parseInt(d)}`;
}

// ── 기준 월 결정 ──
// MID·END 공시일이 같은 달 = 이번달 완료, 다른 달 = 이전 달 기준
const _midM = (typeof MID_NOTICE_DATE !== 'undefined' && MID_NOTICE_DATE)
  ? MID_NOTICE_DATE.slice(0,7) : '';
const _endM = (typeof END_NOTICE_DATE !== 'undefined' && END_NOTICE_DATE)
  ? END_NOTICE_DATE.slice(0,7) : '';
const isComplete = Boolean(_midM && _endM && _midM === _endM);
const targetMonth = isComplete ? _midM : _endM;                 // "YYYY-MM"
const targetMonthLabel = targetMonth
  ? `${parseInt(targetMonth.split('-')[1])}월` : '';

// ── 필터 상태 ──
let filterType = 'all';
let allData    = [];   // 데이터 로드 후 채워짐

function setFilter(group, val) {
  if (group === 'type') filterType = val;
  document.querySelectorAll(`[data-group="${group}"]`).forEach(b => {
    b.classList.toggle('on', b.dataset.v === val);
  });
  render();
}

// ── 렌더 ──
function render() {
  let data = [...allData];
  if (filterType !== 'all') data = data.filter(e => getCategory(e) === filterType);
  data.sort((a, b) => b.rate - a.rate);

  document.getElementById('resultMeta').textContent = `총 ${data.length}개 ETF`;

  if (!data.length) {
    document.getElementById('rankingList').innerHTML =
      `<div class="empty"><p>조건에 맞는 ETF가 없습니다.</p></div>`;
    return;
  }

  const html = data.map((e, i) => {
    const rank = i + 1;
    const timingBadge = e.timing === '월중'
      ? `<span class="badge badge-mid">월중</span>`
      : e.timing === '월말'
      ? `<span class="badge badge-end">월말</span>`
      : '';
    const typeBadge = `<span class="badge badge-type">${getCategory(e)}</span>`;
    return `
      <a href="/etf/${e.code}" class="rank-item">
        <div class="rank-num${rank <= 3 ? ' top' : ''}">${rank}</div>
        <div class="rank-body">
          <div class="rank-name">${e.name}${timingBadge}${typeBadge}</div>
          <div class="rank-meta">
            <span class="rank-meta-item">${e.brand}</span>
            <span class="rank-meta-item">배당락 ${fmtDate(e.ex)}</span>
            <span class="rank-meta-item">지급 ${fmtDate(e.pay)}</span>
          </div>
        </div>
        <div class="rank-right">
          <div class="rank-rate">${e.rate}%</div>
          <div class="rank-dist">${e.dist.toLocaleString()}원/좌</div>
        </div>
      </a>`;
  }).join('');

  document.getElementById('rankingList').innerHTML = html;
}

// ── 통계 ──
function updateStats(data) {
  const midCount = data.filter(e => e.timing === '월중').length;
  const endCount = data.filter(e => e.timing === '월말').length;
  document.getElementById('statCount').textContent = data.length + '개';
  document.getElementById('statSub').textContent   = `월중 ${midCount}개 · 월말 ${endCount}개`;

  if (data.length) {
    const top     = [...data].sort((a,b) => b.rate - a.rate)[0];
    const topName = top.name.length > 14 ? top.name.slice(0,13)+'…' : top.name;
    document.getElementById('statMax').textContent     = top.rate + '%';
    document.getElementById('statMaxName').textContent = topName;
    const avg = data.reduce((s,e) => s + e.rate, 0) / data.length;
    document.getElementById('statAvg').textContent = avg.toFixed(2) + '%';
  }
}

// ── 데이터 로드 ──
async function loadAndRender() {
  // 헤더 업데이트
  if (targetMonthLabel) {
    document.getElementById('pageTitle').textContent     = `${targetMonthLabel} 월배당 분배율 랭킹`;
    document.getElementById('pageSubTitle').textContent  = `${targetMonthLabel} 월중·월말 분배금 공시 기준 월배당 ETF 랭킹입니다.`;
    document.title = `${targetMonthLabel} 월배당 분배율 랭킹 - 배당픽`;
  }
  if (typeof PRICE_DATE !== 'undefined') {
    document.getElementById('updateBadge').textContent = `가격 기준 ${PRICE_DATE.replace(/-/g,'.')}`;
  }

  if (isComplete) {
    // 이번달 완료 → ETF_ALL 직접 사용
    allData = (ETF_ALL || []).filter(e =>
      e.current && isMonthly(e) &&
      (e.timing === '월중' || e.timing === '월말') && e.dist > 0
    );
  } else {
    // 이전 달 기준 → 월말은 ETF_ALL, 월중은 history.json
    const endData   = (ETF_ALL || []).filter(e =>
      e.current && isMonthly(e) && e.timing === '월말' && e.dist > 0
    );
    const endISINs  = new Set(endData.map(e => e.isin));
    const priceMap  = {};
    (ETF_ALL || []).forEach(e => { if (e.price > 0) priceMap[e.isin] = e; });

    let midData = [];
    if (targetMonth) {
      try {
        const resp    = await fetch('/data/output/history.json');
        const history = await resp.json();
        for (const [isin, entries] of Object.entries(history)) {
          if (endISINs.has(isin)) continue;           // 월말 중복 방지
          const etf = priceMap[isin];
          if (!etf || !isMonthly(etf)) continue;      // 월배당만
          for (const [dateKey, entry] of Object.entries(entries)) {
            if (!dateKey.startsWith(targetMonth)) continue;
            if (!entry.dist || entry.dist <= 0) continue;
            const rate = parseFloat((entry.dist / etf.price * 100).toFixed(2));
            if (rate <= 0) continue;
            const day = parseInt(dateKey.split('-')[2]);
            midData.push({
              isin, code: entry.code, name: entry.name,
              brand: etf.brand, type: etf.type, freq: etf.freq,
              ex: entry.ex, pay: entry.pay,
              dist: entry.dist, price: etf.price, rate,
              timing: day <= 20 ? '월중' : '월말'
            });
          }
        }
      } catch(err) {
        console.warn('history.json 로딩 실패:', err);
      }
    }
    allData = [...endData, ...midData];
  }

  updateStats(allData);
  render();
}

loadAndRender();
</script>
</body>
</html>
