<!DOCTYPE html>
<html lang="ko">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-70RCL5E7B8"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-70RCL5E7B8');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>배당픽 인사이트 - ETF 분배금 분석과 가이드</title>
<meta name="description" content="월배당 ETF 분배금 분석, 투자 가이드, 전략별 비교까지. 배당픽 인사이트에서 ETF 투자에 필요한 정보를 확인하세요.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://bae-dang-pick.vercel.app/insight.html">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f7f4;--white:#fff;--ink:#1a1a18;--ink2:#4a4a45;--ink3:#9a9a93;--ink4:#d4d4cc;--accent:#1d6b38;--accent-bg:#edf7f1;--accent-mid:#6cba8b;--warn:#b45309;--warn-bg:#fffbeb;--border:#e8e8e2;--radius:10px}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans KR",sans-serif;min-height:100vh}
nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:200}
.nav-inner{max-width:1100px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:15px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:7px;text-decoration:none;color:var(--ink)}
.logo-mark{width:22px;height:22px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-link{font-size:12px;color:var(--ink2);text-decoration:none;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);transition:all .15s;white-space:nowrap}
.nav-link:hover{color:var(--accent);border-color:var(--accent-mid);background:var(--accent-bg)}
.nav-link.on{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}
.page-header{background:var(--white);border-bottom:1px solid var(--border);padding:28px 20px 24px}
.page-header-inner{max-width:900px;margin:0 auto}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.page-header p{font-size:13px;color:var(--ink3);line-height:1.6}
.wrap{max-width:900px;margin:0 auto;padding:28px 20px 80px}
/* 카테고리 탭 */
.cat-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.cat-btn{font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--ink3);cursor:pointer;transition:all .15s;font-family:inherit}
.cat-btn:hover{border-color:var(--accent-mid);color:var(--ink)}
.cat-btn.on{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
/* 글 카드 */
.post-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.post-card{display:block;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-decoration:none;color:var(--ink);transition:all .18s}
.post-card:hover{border-color:var(--accent-mid);box-shadow:0 4px 14px rgba(29,107,56,.08);transform:translateY(-1px)}
.post-card-cat{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-bg);padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:10px}
.post-card-cat.guide{color:var(--warn);background:var(--warn-bg)}
.post-card-title{font-size:14px;font-weight:700;letter-spacing:-.3px;line-height:1.45;margin-bottom:7px}
.post-card-summary{font-size:12px;color:var(--ink3);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-card-date{font-size:11px;color:var(--ink4);font-family:"DM Mono",monospace}
.empty{text-align:center;padding:60px 20px;color:var(--ink3);font-size:14px}
footer{padding:18px;text-align:center;font-size:11px;color:var(--ink3);border-top:1px solid var(--border);background:var(--white);line-height:1.8}
footer a{color:var(--ink3);text-underline-offset:2px}
@media(max-width:600px){.post-grid{grid-template-columns:1fr}.nav-links{gap:4px}.nav-link{font-size:11px;padding:4px 8px}}
.pf-fab{position:fixed;bottom:24px;right:24px;z-index:500;background:var(--accent);color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(29,107,56,.3);display:flex;align-items:center;gap:7px;text-decoration:none;transition:all .2s;font-family:"Noto Sans KR",sans-serif;white-space:nowrap}
.pf-fab:hover{background:#165a2e;transform:translateY(-2px)}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><div class="logo-mark">&#8361;</div>배당픽</a>
    <div class="nav-links">
      <a href="/ranking.html" class="nav-link">랭킹</a>
      <a href="/calc.html" class="nav-link">계산기</a>
      <a href="/insight.html" class="nav-link on">인사이트</a>
      <a href="/newsletter.html" class="nav-link">뉴스레터</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-inner">
    <h1>배당픽 인사이트</h1>
    <p>월배당 ETF 분배금 분석, 투자 가이드, 전략별 비교까지 — 데이터 기반으로 정리합니다.</p>
  </div>
</div>

<div class="wrap">
  <div class="cat-row" id="catRow">
    <button class="cat-btn on" onclick="filterCat('all')">전체</button>
    <button class="cat-btn" onclick="filterCat('월간분석')">월간분석</button>
    <button class="cat-btn" onclick="filterCat('가이드')">가이드</button>
  </div>
  <div class="post-grid" id="postGrid">
    <div class="empty">불러오는 중...</div>
  </div>
</div>

<footer>
  본 사이트의 정보는 참고 목적으로만 제공되며, 투자의 최종 판단은 본인에게 있습니다.
  <br><a href="https://docs.google.com/forms/d/e/1FAIpQLSflCQap_v_YXjEwRVnjiaQhh9Nkppmw0HWK8YQ1HzR7lAKf9g/viewform?usp=publish-editor" target="_blank" rel="noopener">오류 및 개선 의견 보내기</a>
  &nbsp;·&nbsp;<a href="/privacy.html">개인정보처리방침</a>
</footer>
<a href="/portfolio.html" class="pf-fab">⭐ <span>MY ETF</span></a>

<script>
let allPosts = [];
let activeCat = 'all';

async function loadPosts() {
  try {
    const res = await fetch('/insight/posts.json?v=' + Date.now());
    allPosts = await res.json();
    renderPosts();
  } catch(e) {
    document.getElementById('postGrid').innerHTML = '<div class="empty">글을 불러오지 못했습니다.</div>';
  }
}

function filterCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('on', b.textContent.trim() === (cat === 'all' ? '전체' : cat)));
  renderPosts();
}

function renderPosts() {
  const posts = activeCat === 'all' ? allPosts : allPosts.filter(p => p.category === activeCat);
  const grid = document.getElementById('postGrid');
  if (!posts.length) {
    grid.innerHTML = '<div class="empty">해당 카테고리의 글이 없습니다.</div>';
    return;
  }
  grid.innerHTML = posts.map(p => {
    const catClass = p.category === '가이드' ? 'guide' : '';
    const dateStr = p.date === '2024-01-01' ? '' : `<div class="post-card-date">${p.date}</div>`;
    return `<a href="/${p.file}" class="post-card">
      <div class="post-card-cat ${catClass}">${p.category}</div>
      <div class="post-card-title">${p.title}</div>
      <div class="post-card-summary">${p.summary}</div>
      ${dateStr}
    </a>`;
  }).join('');
}

loadPosts();
</script>
</body>
</html>
