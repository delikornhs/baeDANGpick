*{margin:0;padding:0;box-sizing:border-box}

.nav-links{display:flex;gap:6px;align-items:center}
.nav-link{font-size:12px;color:var(--ink2);text-decoration:none;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);transition:all .15s;white-space:nowrap}
.nav-link:hover{color:var(--accent);border-color:var(--accent-mid);background:var(--accent-bg)}
.nav-link.on{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}

/* PAGE HEADER */
.page-header{background:var(--white);border-bottom:1px solid var(--border);padding:28px 20px 24px}
.page-header-inner{max-width:1100px;margin:0 auto}
.page-header h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.page-header p{font-size:13px;color:var(--ink3);line-height:1.6}

/* SECTION */
.section{max-width:1100px;margin:0 auto;padding:32px 20px}

/* GUIDE CARDS */
.guide-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.guide-card{display:block;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;text-decoration:none;color:var(--ink);transition:all .18s}
.guide-card:hover{border-color:var(--accent-mid);box-shadow:0 4px 14px rgba(29,107,56,.08);transform:translateY(-1px)}
.guide-num{font-size:10px;font-family:"DM Mono",monospace;color:var(--accent);font-weight:700;margin-bottom:8px}
.guide-card-title{font-size:14px;font-weight:700;letter-spacing:-.3px;line-height:1.45;margin-bottom:5px}
.guide-card-desc{font-size:12px;color:var(--ink3);margin-bottom:12px;line-height:1.5}
.guide-read{font-size:12px;color:var(--accent);font-weight:500}

@media(max-width:680px){
  .guide-grid{grid-template-columns:1fr}
  .nav-inner{height:auto;padding:8px 0;flex-direction:column;align-items:flex-start;gap:6px}
  .nav-links{gap:12px}
}

footer{padding:18px;text-align:center;font-size:11px;color:var(--ink3);border-top:1px solid var(--border);background:var(--white);line-height:1.8}
