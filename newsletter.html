<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f7f4;--white:#fff;--ink:#1a1a18;--ink2:#4a4a45;--ink3:#9a9a93;--ink4:#d4d4cc;
  --accent:#1d6b38;--accent-bg:#edf7f1;--accent-mid:#6cba8b;
  --warn:#b45309;--warn-bg:#fffbeb;
  --border:#e8e8e2;--radius:10px;
}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans KR",sans-serif;min-height:100vh}

/* ── nav ── */
nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:200}
.nav-inner{max-width:900px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:15px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:7px;text-decoration:none;color:var(--ink)}
.logo-mark{width:22px;height:22px;background:var(--accent);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.nav-links{display:flex;gap:6px;align-items:center}
.nav-link{font-size:12px;color:var(--ink2);text-decoration:none;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);transition:all .15s;white-space:nowrap}
.nav-link:hover{color:var(--accent);border-color:var(--accent-mid);background:var(--accent-bg)}
.nav-link.on{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}

/* ── 본문 ── */
.wrap{max-width:900px;margin:0 auto;padding:32px 20px 60px}

/* ── 헤더 ── */
.page-header{margin-bottom:32px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.page-desc{font-size:14px;color:var(--ink3);line-height:1.6}

/* ── 구독 CTA ── */
.sub-banner{background:var(--accent-bg);border:1px solid var(--accent-mid);border-radius:var(--radius);padding:18px 20px;margin-bottom:32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.sub-banner-text{font-size:14px;color:var(--accent);font-weight:600;line-height:1.5}
.sub-banner-sub{font-size:12px;color:var(--ink2);font-weight:400;margin-top:2px}
.sub-btn{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;transition:opacity .15s}
.sub-btn:hover{opacity:.85}

/* ── 뉴스레터 카드 ── */
.nl-list{display:flex;flex-direction:column;gap:12px}
.nl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.nl-card-head{padding:16px 20px;cursor:pointer;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;user-select:none}
.nl-card-head:hover{background:var(--bg)}
.nl-card-left{display:flex;flex-direction:column;gap:6px}
.nl-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.2px}
.badge-month{background:#e8e8e2;color:var(--ink2)}
.badge-timing{background:var(--accent-bg);color:var(--accent)}
.badge-data{background:#fff3e0;color:#c17108}
.badge-schedule{background:#e8f0fe;color:#1d4ed8}
.nl-title{font-size:15px;font-weight:700;letter-spacing:-.3px;line-height:1.4}
.nl-meta{font-size:12px;color:var(--ink3);font-family:"DM Mono",monospace}
.nl-toggle{color:var(--ink4);font-size:18px;flex-shrink:0;transition:transform .2s;margin-top:2px}
.nl-card.open .nl-toggle{transform:rotate(180deg)}

/* ── 카드 본문 ── */
.nl-body{display:none;border-top:1px solid var(--border);padding:20px}
.nl-card.open .nl-body{display:block}

/* data 타입: ETF 테이블 */
.nl-table{width:100%;border-collapse:collapse;font-size:13px}
.nl-table th{text-align:left;color:var(--ink3);font-weight:600;font-size:11px;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
.nl-table td{padding:8px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.nl-table tr:last-child td{border-bottom:none}
.nl-table tr:hover td{background:var(--bg)}
.rank-no{font-family:"DM Mono",monospace;font-size:12px;color:var(--ink3);width:28px}
.etf-name{font-weight:600;line-height:1.3}
.etf-brand{font-size:11px;color:var(--ink3);margin-top:2px}
.dist-val{font-family:"DM Mono",monospace;font-weight:700;text-align:right;color:var(--ink)}
.rate-val{font-family:"DM Mono",monospace;font-weight:700;text-align:right;color:var(--accent)}
.pay-val{font-family:"DM Mono",monospace;font-size:11px;color:var(--ink3);text-align:right}
.col-r{text-align:right}

/* schedule 타입: 날짜 카드 */
.date-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.date-item{background:var(--bg);border-radius:8px;padding:14px 16px;text-align:center}
.date-label{font-size:11px;color:var(--ink3);font-weight:600;margin-bottom:6px}
.date-value{font-size:16px;font-weight:700;font-family:"DM Mono",monospace;color:var(--ink);letter-spacing:-.5px}
.date-sub{font-size:11px;color:var(--ink3);margin-top:3px}

/* 빈 상태 */
.empty{text-align:center;padding:60px 20px;color:var(--ink3)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--ink2)}
.empty-desc{font-size:13px;line-height:1.6}

@media(max-width:600px){
  .date-grid{grid-template-columns:1fr}
  .nl-table th:nth-child(4),.nl-table td:nth-child(4){display:none}
  .sub-banner{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="logo"><div class="logo-mark">배</div>배당픽</a>
    <div class="nav-links">
      <a href="/insight.html" class="nav-link">인사이트</a>
      <a href="/ranking.html" class="nav-link">랭킹</a>
      <a href="/calc.html" class="nav-link">계산</a>
      <a href="/newsletter.html" class="nav-link on">뉴스레터</a>
    </div>
  </div>
</nav>

<div class="wrap">

  <!-- 헤더 -->
  <div class="page-header">
    <div class="page-title">뉴스레터 아카이브</div>
    <div class="page-desc">배당픽이 발송한 뉴스레터를 모아볼 수 있습니다.<br>월배당 ETF 분배금 공시 내역과 배당락일 일정을 확인하세요.<br>구독 시 관심 ETF를 등록하면 해당 ETF 중심으로 개인화된 뉴스레터를 받을 수 있습니다.</div>
  </div>

  <!-- 구독 CTA -->
  <div class="sub-banner" id="subBanner">
    <div>
      <div class="sub-banner-text">📬 뉴스레터 구독하기</div>
      <div class="sub-banner-sub">분배금 공시·배당 일정을 월 2회 이메일로 받아보세요. 관심 ETF를 등록하면 해당 ETF 중심으로 맞춤 뉴스레터를 드립니다. 무료.</div>
    </div>
    <a href="/" class="sub-btn" id="subBtn">구독하기 →</a>
  </div>

  <!-- 뉴스레터 목록 -->
  <div class="nl-list" id="nlList">
    <div class="empty">
      <div class="empty-icon">📭</div>
      <div class="empty-title">불러오는 중...</div>
    </div>
  </div>

</div>

<script>
const ARCHIVE_URL = '/data/output/newsletter/archive.json';

// ── 날짜 포맷 (YYYY-MM-DD → M월 D일) ────────────────
function fmtDate(s) {
  if (!s) return '-';
  const [, m, d] = s.split('-');
  return `${parseInt(m)}월 ${parseInt(d)}일`;
}
function weekday(s) {
  if (!s) return '';
  const days = ['일','월','화','수','목','금','토'];
  return days[new Date(s).getDay()] + '요일';
}

// ── 카드 렌더 ─────────────────────────────────────────
function renderCard(item, idx) {
  const isData = item.type === 'data';
  const typeBadge = isData
    ? '<span class="badge badge-data">분배금 공시</span>'
    : '<span class="badge badge-schedule">배당 일정</span>';
  const timingBadge = `<span class="badge badge-timing">${item.timing}</span>`;
  const monthBadge  = `<span class="badge badge-month">${item.month}</span>`;

  const title = isData
    ? `${item.month} ${item.timing} 분배금 공시`
    : `${item.month} ${item.timing} 배당 일정 안내`;

  // 본문
  let bodyHtml = '';
  if (isData && item.etfs && item.etfs.length) {
    const rows = item.etfs.map((e, i) => `
      <tr>
        <td class="rank-no">${i + 1}</td>
        <td><div class="etf-name">${e.name}</div><div class="etf-brand">${e.brand}</div></td>
        <td class="dist-val col-r">${e.dist}<small style="font-size:10px;font-weight:400;color:var(--ink3)">원</small></td>
        <td class="rate-val col-r">${parseFloat(e.rate).toFixed(2)}<small style="font-size:10px;font-weight:400">%</small></td>
        <td class="pay-val col-r">${fmtDate(e.pay)}</td>
      </tr>`).join('');
    bodyHtml = `
      <table class="nl-table">
        <thead><tr>
          <th></th>
          <th>ETF</th>
          <th class="col-r">분배금</th>
          <th class="col-r">분배율</th>
          <th class="col-r">지급일</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else if (!isData) {
    bodyHtml = `
      <div class="date-grid">
        <div class="date-item">
          <div class="date-label">최종 매수일</div>
          <div class="date-value">${fmtDate(item.lastBuy)}</div>
          <div class="date-sub">${weekday(item.lastBuy)}</div>
        </div>
        <div class="date-item">
          <div class="date-label">배당락일</div>
          <div class="date-value">${fmtDate(item.exDate)}</div>
          <div class="date-sub">${weekday(item.exDate)}</div>
        </div>
        <div class="date-item">
          <div class="date-label">기준일</div>
          <div class="date-value">${fmtDate(item.record)}</div>
          <div class="date-sub">${weekday(item.record)}</div>
        </div>
      </div>`;
  }

  return `
    <div class="nl-card" id="card-${idx}">
      <div class="nl-card-head" onclick="toggle(${idx})">
        <div class="nl-card-left">
          <div class="nl-badges">${monthBadge}${timingBadge}${typeBadge}</div>
          <div class="nl-title">${title}</div>
          <div class="nl-meta">발송 ${item.sent_at}</div>
        </div>
        <div class="nl-toggle">▾</div>
      </div>
      <div class="nl-body">${bodyHtml}</div>
    </div>`;
}

function toggle(idx) {
  const card = document.getElementById('card-' + idx);
  card.classList.toggle('open');
}

// ── 구독 버튼: 메인 페이지 구독 섹션으로 이동 ─────────
function setupSubBtn() {
  const btn = document.getElementById('subBtn');
  if (btn) btn.href = '/#subscribe';
}

// ── 메인 로드 ─────────────────────────────────────────
async function load() {
  setupSubBtn();
  const listEl = document.getElementById('nlList');
  try {
    const res = await fetch(ARCHIVE_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const archive = await res.json();

    if (!archive.length) {
      listEl.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📭</div>
          <div class="empty-title">아직 발송된 뉴스레터가 없습니다</div>
          <div class="empty-desc">구독하시면 분배금 공시와 배당 일정을<br>이메일로 바로 받아보실 수 있습니다.</div>
        </div>`;
      return;
    }

    listEl.innerHTML = archive.map((item, i) => renderCard(item, i)).join('');

    // 첫 번째 항목 자동 펼침
    const first = document.getElementById('card-0');
    if (first) first.classList.add('open');

  } catch (e) {
    listEl.innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">불러오기 실패</div>
        <div class="empty-desc">잠시 후 다시 시도해주세요.</div>
      </div>`;
  }
}

load();
</script>
</body>
