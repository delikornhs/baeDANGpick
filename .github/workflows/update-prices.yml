name: Daily Price Update

on:
  schedule:
    # 08:30 UTC = 17:30 KST, 평일만 실행 (한국 장 마감 후)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests xlrd

      - name: Fetch ETF meta (Monday or manual trigger)
        run: |
          DOW=$(date -u +%u)
          EVENT="${{ github.event_name }}"
          if [ "$DOW" = "1" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "메타 데이터 갱신 (DOW=$DOW, event=$EVENT)"
            python etf_data_processor.py --fetch-meta
          else
            echo "평일(월 제외) — 메타 스킵"
          fi

      - name: Fetch latest prices
        run: python etf_data_processor.py --prices-only

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/latest.json data/output/etf_data.js index.html
          git add data/output/etf_meta.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "변경 없음, 스킵"
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "dist_changed=false" >> $GITHUB_OUTPUT
          else
            # 커밋 전 해시 저장 (분배금 필드 변경 여부 비교용)
            OLD_HASH=$(git rev-parse HEAD)
            git commit -m "chore: daily price update $(date -u +%Y-%m-%d)"
            git pull --rebase origin master
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            # 분배금 공시 고유 필드(dist·ex_date·pay_date·notice_date·timing)만 변경됐는지 확인
            # price·rate는 가격 업데이트 시 매일 바뀌므로 제외
            if git diff "$OLD_HASH" HEAD -- data/output/latest.json \
               | grep -E '^\+[^+].*"(dist|ex_date|pay_date|notice_date|timing)"' \
               | grep -qv '"timing": ""'; then
              echo "dist_changed=true" >> $GITHUB_OUTPUT
              echo "분배금 공시 데이터 변경 감지 → 뉴스레터 발송"
            else
              echo "dist_changed=false" >> $GITHUB_OUTPUT
              echo "가격만 변경됨 → 뉴스레터 스킵"
            fi
          fi

      - name: Send newsletter (분배금 공시 데이터 변경 시에만)
        if: steps.commit.outputs.dist_changed == 'true' && env.NEWSLETTER_SECRET != ''
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          NEWSLETTER_SECRET: ${{ secrets.NEWSLETTER_SECRET }}
        run: python trigger_newsletter.py --type data
