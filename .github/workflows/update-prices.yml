name: Daily Price Update

on:
  schedule:
    # 08:30 UTC = 17:30 KST, 평일만 실행 (한국 장 마감 후)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests xlrd

      - name: Fetch latest prices
        run: python etf_data_processor.py --prices-only

      - name: Fetch ETF meta (weekly, Monday only)
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "1" ]; then
            echo "월요일 — 메타 데이터 갱신"
            python etf_data_processor.py --fetch-meta
          else
            echo "평일(월 제외) — 메타 스킵"
          fi

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/latest.json data/output/etf_data.js data/output/etf_meta.json index.html
          if git diff --cached --quiet; then
            echo "변경 없음, 스킵"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: daily price update $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Send newsletter (공시 데이터 변경 시에만)
        if: steps.commit.outputs.changed == 'true' && env.NEWSLETTER_SECRET != ''
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          NEWSLETTER_SECRET: ${{ secrets.NEWSLETTER_SECRET }}
        run: python trigger_newsletter.py --type data
