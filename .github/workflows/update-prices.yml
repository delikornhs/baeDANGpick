name: Daily Price Update

on:
  schedule:
    # 08:30 UTC = 17:30 KST, 평일만 실행 (한국 장 마감 후)
    - cron: '30 8 * * 1-5'
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests xlrd

      - name: Fetch latest prices
        run: python etf_data_processor.py --prices-only

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/latest.json data/output/etf_data.js index.html
          if git diff --cached --quiet; then
            echo "변경 없음, 스킵"
          else
            git commit -m "chore: daily price update $(date -u +%Y-%m-%d)"
            git push
          fi
